









{% extends 'base.html' %}

{% block title %} Register {% endblock title %}

{% block content %}

<main class="page-section">
    <div class="container auth-wrapper">
        <div class="auth-card">
            <h1>Ro'yxatdan o'tish</h1>
            <p class="subtitle">Yangi hisob yarating va qulay xaridlarni boshlang</p>
            <form data-toast="Tasdiqlash kodi email pochtangizga yuborildi!" data-redirect="confirm-password.html">
                <div class="form-group mb-2">
                    <label>Ism va Familiya</label>
                    <input type="text" required placeholder="To'liq ismingiz">
                </div>
                <div class="form-group mb-2">
                    <label>Email manzilingiz</label>
                    <input type="email" required placeholder="misol@gmail.com">
                </div>
                <div class="form-group mb-2">
                    <label>Parol</label>
                    <input type="password" required placeholder="Eng kamida 8 ta belgi">
                </div>
                <div class="form-group mb-2">
                    <label>Parolni tasdiqlang</label>
                    <input type="password" required placeholder="Parolni qayta kiriting">
                </div>
                <button type="submit" class="btn btn-accent" style="width:100%; margin-top:10px; font-size:1.1rem; padding:14px;">Ro'yxatdan o'tish</button>
            </form>
            <div class="auth-divider">yoki</div>
            <p class="text-center" style="color: var(--text-gray); font-size: 0.95rem;">Allaqachon hisobingiz bormi? <a href="login.html" class="auth-link" style="margin-top: 0;">Tizimga kirish</a></p>
        </div>
    </div>
</main>


{% endblock content %}
